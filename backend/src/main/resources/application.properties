spring.application.name=blog

# Default: H2 in-memory (works locally without external DB)
# For production, use -Dspring.profiles.active=prod
spring.datasource.url=jdbc:h2:mem:blogdb;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# JWT Configuration
jwt.secret=${JWT_SECRET:your-256-bit-secret-key-here-make-it-at-least-32-bytes-long}
jwt.expiry.ms=${JWT_EXPIRY_MS:86400000}

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
