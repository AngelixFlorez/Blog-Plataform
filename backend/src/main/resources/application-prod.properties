# Production: PostgreSQL (via NEON or standalone)
# NEON_DATABASE_URL is read from environment and sanitized (removes channel_binding=require)
server.port=${PORT:8080}
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,org.springframework.boot.autoconfigure.jdbc.DataSourceTransactionManagerAutoConfiguration,org.springframework.boot.autoconfigure.jdbc.DataSourceInitializationAutoConfiguration
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.connection.ssl.mode=require

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

logging.level.com.devangeli.blog=INFO

# Keepalive (prevents Render from spinning down the free tier)
app.keepalive.enabled=true
app.keepalive.interval=840000
