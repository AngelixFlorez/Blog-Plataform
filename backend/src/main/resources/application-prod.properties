# Production: PostgreSQL (via NEON or standalone)
# DATABASE_URL is the NEON / Render connection string (postgresql://user:pass@host/db?sslmode=require)
# The 'jdbc:' prefix is added automatically via property substitution.
# When DATABASE_URL (NEON) is set, it already contains credentials.
# When using individual params, set SPRING_DATASOURCE_USERNAME and DB_PASSWORD.
spring.datasource.url=jdbc:${DATABASE_URL:postgresql://${SPRING_DATASOURCE_HOST:localhost}:${SPRING_DATASOURCE_PORT:5432}/${SPRING_DATASOURCE_DBNAME:postgres}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.connection.ssl.mode=require

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

logging.level.com.devangeli.blog=INFO

# Keepalive (prevents Render from spinning down the free tier)
app.keepalive.enabled=true
app.keepalive.interval=840000
