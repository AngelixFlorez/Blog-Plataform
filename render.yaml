services:
  - type: web
    name: blog-backend
    runtime: docker
    dockerfilePath: backend/Dockerfile
    healthCheckPath: /api/v1/posts
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRY_MS
        value: "86400000"
      - key: DB_PASSWORD
        fromDatabase:
          name: blog-db
          property: password
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: blog-db
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: blog-db
          property: user

  - type: web
    name: blog-frontend
    runtime: static
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false

databases:
  - name: blog-db
    plan: free
